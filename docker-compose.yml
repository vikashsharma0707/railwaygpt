version: "3.9"

services:
  server:
    build:
      context: ./server
    container_name: railwaygpt-backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/logs:/app/logs

  client:
    build:
      context: ./client
    container_name: railwaygpt-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server