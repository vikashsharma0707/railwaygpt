name: Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build -t vikashsharma0707/railwaygpt-backend:latest ./server

      - name: Build Frontend
        run: |
          docker build -t vikashsharma0707/railwaygpt-frontend:latest ./client

      - name: Push Backend
        run: |
          docker push vikashsharma0707/railwaygpt-backend:latest

      - name: Push Frontend
        run: |
          docker push vikashsharma0707/railwaygpt-frontend:latest