version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: railwaygpt-backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: railwaygpt-frontend
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"