events {}
http {
  upstream server { server server:5000; }
  upstream client { server client:80; }
  server {
    listen 80;
    location /api/ { proxy_pass http://server/api/; }
    location /socket.io/ {
      proxy_pass http://server/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
    location / { proxy_pass http://client/; }
  }
}
