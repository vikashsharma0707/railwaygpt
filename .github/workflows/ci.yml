name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: server/package-lock.json }
      - run: npm ci
        working-directory: server
      - run: npm test -- --ci
        working-directory: server
        env:
          MONGO_URI: mongodb://localhost:27017/railwaygpt_test
          JWT_ACCESS_SECRET: test
          JWT_REFRESH_SECRET: test

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: client/package-lock.json }
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client

  docker:
    needs: [server, client]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build -t ghcr.io/${{ github.repository }}/server:${{ github.sha }} ./server
      - run: docker build -t ghcr.io/${{ github.repository }}/client:${{ github.sha }} ./client
      - run: docker push ghcr.io/${{ github.repository }}/server:${{ github.sha }}
      - run: docker push ghcr.io/${{ github.repository }}/client:${{ github.sha }}
