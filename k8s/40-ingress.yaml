name: RailwayGPT CI/CD

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t vikashsharma0707/railwaygpt-backend:latest ./server

      - name: Build Frontend Image
        run: |
          docker build -t vikashsharma0707/railwaygpt-frontend:latest ./client

      - name: Push Backend Image
        run: |
          docker push vikashsharma0707/railwaygpt-backend:latest

      - name: Push Frontend Image
        run: |
          docker push vikashsharma0707/railwaygpt-frontend:latest