apiVersion: apps/v1
kind: Deployment
metadata: { name: railwaygpt-client, namespace: railwaygpt }
spec:
  replicas: 2
  selector: { matchLabels: { app: railwaygpt-client } }
  template:
    metadata: { labels: { app: railwaygpt-client } }
    spec:
      containers:
      - name: client
        image: ghcr.io/your-org/railwaygpt/client:latest
        ports: [{ containerPort: 80 }]
        readinessProbe: { httpGet: { path: /, port: 80 } }
---
apiVersion: v1
kind: Service
metadata: { name: railwaygpt-client, namespace: railwaygpt }
spec:
  selector: { app: railwaygpt-client }
  ports: [{ port: 80, targetPort: 80 }]
