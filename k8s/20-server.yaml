apiVersion: apps/v1
kind: Deployment
metadata: { name: railwaygpt-server, namespace: railwaygpt }
spec:
  replicas: 2
  selector: { matchLabels: { app: railwaygpt-server } }
  template:
    metadata: { labels: { app: railwaygpt-server } }
    spec:
      containers:
      - name: server
        image: ghcr.io/your-org/railwaygpt/server:latest
        ports: [{ containerPort: 5000 }]
        envFrom:
          - configMapRef: { name: railwaygpt-config }
          - secretRef: { name: railwaygpt-secrets }
        readinessProbe: { httpGet: { path: /api/health, port: 5000 }, initialDelaySeconds: 10, periodSeconds: 10 }
        livenessProbe:  { httpGet: { path: /api/health, port: 5000 }, initialDelaySeconds: 30, periodSeconds: 30 }
        resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: railwaygpt-server, namespace: railwaygpt }
spec:
  selector: { app: railwaygpt-server }
  ports: [{ port: 5000, targetPort: 5000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: railwaygpt-server-hpa, namespace: railwaygpt }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: railwaygpt-server }
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
